services:
  web-app:
    container_name: web-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    volumes:
      - static-files:/app/.next/static
    ports:
      - 3000:3000
    networks:
      - tmp_network
    depends_on:
      - postgres

  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tmp_network

volumes:
  static-files:
  postgres-data:

networks:
  tmp_network:
    driver: bridge
