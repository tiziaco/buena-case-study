services:
  web-app:
    container_name: web-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for Docker networking (use service name instead of localhost)
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    restart: always
    volumes:
      - static-files:/app/.next/static
    ports:
      - 3000:3000
    networks:
      - tmp_network
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tmp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  static-files:
  postgres-data:

networks:
  tmp_network:
    driver: bridge
